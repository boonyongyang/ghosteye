name: ghosteye
description: "Ghosteye: an on-device cinematic teleprompter driven by Gemma vision."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_gemma: ^0.11.8
  ghosteye_frame_ffi:
    path: packages/ghosteye_frame_ffi
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  camera: ^0.11.0+2
  file_selector: ^1.0.3
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  image: ^4.2.0
  shared_preferences: ^2.3.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.0

dependency_overrides:
  background_downloader: 9.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
